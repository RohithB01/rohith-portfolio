  <rect x="62" y="450" width="200" height="6" rx="3" fill="#ffffff15"/>
  <rect x="62" y="450" width="174" height="6" rx="3" fill="#00d4aa70"/>
  <text x="267" y="459" font-family="Arial" font-size="9" fill="#00d4aa">87%</text>
  <text x="62" y="490" font-family="Arial" font-size="18" font-weight="bold" fill="#fff">284,807</text>
  <text x="62" y="508" font-family="Arial" font-size="10" fill="#888">Transactions Analyzed</text>
  <text x="180" y="490" font-family="Arial" font-size="18" font-weight="bold" fill="#ff4d4d">492</text>
