  <rect x="52" y="208" width="3" height="36" rx="2" fill="#ff4d4d"/>
  <text x="64" y="222" font-family="Arial" font-size="10" fill="#ff4d4d">⚠ TXN_7823 — HIGH RISK</text>
  <text x="64" y="237" font-family="Arial" font-size="9" fill="#666">$4,250 • 2 secs ago</text>
  <rect x="52" y="252" width="260" height="36" rx="4" fill="#fbbf2410"/>
  <rect x="52" y="252" width="3" height="36" rx="2" fill="#fbbf24"/>
  <text x="64" y="266" font-family="Arial" font-size="10" fill="#fbbf24">⚡ TXN_7819 — MEDIUM</text>
