      <stop offset="0%" style="stop-color:#0d0a1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12102a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#6366f1" flood-opacity="0.18"/>
